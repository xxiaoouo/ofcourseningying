<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Analysis - AI Money Buddy</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <!-- PHONE FRAME（Key: restrict within screen） -->
  <div class="phone-frame" style="position:relative; height:100vh; overflow:hidden;">

    <!-- APP（Vertical layout） -->
    <div class="app" style="display:flex; flex-direction:column; height:715xh;">

      <!-- Banner -->
      <header class="banner">
        <h1>OVERSPENDING DETECTION</h1>
        <p>Spending Analysis</p>
      </header>

      <!-- Main Content -->
      <main style="flex:1; overflow-y:auto;">

        <!-- Time range selection -->
        <div class="card">
          <label for="timeRange">View by:</label>
          <select id="timeRange">
            <option value="daily">Daily</option>
            <option value="weekly" selected>Weekly</option>
            <option value="monthly">Monthly</option>
          </select>
        </div>

        <!-- Chart -->
        <div class="card">
          <h3>Spending Chart</h3>
          <canvas id="spendingChart"></canvas>
        </div>

        <!-- Insights -->
        <div class="card">
          <h3>Insights</h3>
          <ul id="insightList" style="text-align:left;"></ul>
        </div>

        <!-- Prevent being blocked by navigation bar  -->
        <div style="height:90px;"></div>

      </main>

      <!-- NAVBAR（Key: lock at bottom）） -->
      <nav class="bottom-nav" style="position:absolute; bottom:0; left:0; right:0;">
        <a href="index.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span>Home</span>
        </a>

        <a href="aichat.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span>Chat</span>
        </a>

        <a href="analysis.html" class="nav-item active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
          <span>Analysis</span>
        </a>

        <a href="riskprediction.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <span>Risk</span>
        </a>

        <a href="debt.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="1" y="4" width="22" height="16" rx="2"/>
            <line x1="1" y1="10" x2="23" y2="10"/>
          </svg>
          <span>Debt</span>
        </a>

        <a href="me.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span>Me</span>
        </a>
      </nav>

    </div>
  </div>

  <!-- SCRIPT -->
  <script>
    const ctx = document.getElementById('spendingChart').getContext('2d');
    const insightList = document.getElementById('insightList');

    const budget = localStorage.getItem("budget") || 600;
    const spent = localStorage.getItem("spent") || 120;

    const dataSets = {
      daily: {
        labels: ['Breakfast', 'Lunch', 'Dinner', 'Snacks'],
        data: [20, 35, 40, 15],
        insights: () => [
          spent > budget / 30
            ? "Daily spending exceeded average daily budget."
            : "Daily spending is within budget."
        ]
      },

      weekly: {
        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
        data: [80, 120, 60, 150, 200, 90, 100],
        insights: () => [
          (spent / budget * 100).toFixed(1) > 80
            ? `You have used ${(spent / budget * 100).toFixed(1)}% of your budget this week.`
            : "Weekly spending is under control.",
          "High spending detected on Friday."
        ]
      },

      monthly: {
        labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
        data: [400, 600, 500, 700],
        insights: () => [
          spent > budget
            ? `Monthly spending exceeded budget by RM${spent - budget}.`
            : `You are within budget.`,
          "Prediction: If trend continues, you will save RM200."
        ]
      }
    };

    let chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: dataSets.weekly.labels,
        datasets: [{
          label: 'Spending (RM)',
          data: dataSets.weekly.data,
          backgroundColor: '#4D7E6E'
        }]
      }
    });

    function updateInsights(insights) {
      insightList.innerHTML = "";
      insights.forEach(text => {
        const li = document.createElement("li");
        li.textContent = text;
        insightList.appendChild(li);
      });
    }

    updateInsights(dataSets.weekly.insights());

    document.getElementById('timeRange').addEventListener('change', function () {
      const selected = this.value;

      chart.data.labels = dataSets[selected].labels;
      chart.data.datasets[0].data = dataSets[selected].data;
      chart.update();

      updateInsights(dataSets[selected].insights());
    });
  </script>

</body>
</html>
